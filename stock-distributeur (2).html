<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock du distributeur</title>
<style>
  body { font-family: -apple-system, Arial, sans-serif; max-width: 480px; margin: 0 auto; padding: 16px; background: #f7f7f5; color: #222; }
  h1 { font-size: 20px; margin: 0 0 16px; }
  .row { display: flex; gap: 8px; margin-bottom: 12px; }
  input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
  button { padding: 10px 16px; border: 1px solid #333; border-radius: 6px; background: #222; color: white; font-size: 14px; }
  button:active { opacity: 0.8; }
  #status { font-size: 13px; color: #666; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
  td { padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 14px; }
  td.qty { text-align: right; font-weight: 600; }
  td.empty { color: #c0392b; }
  td.full { color: #27ae60; }
  .savebar { font-size: 12px; color: #999; margin-top: 16px; }
</style>
</head>
<body>
  <h1>Stock du distributeur</h1>
  <div class="row">
    <input id="token" type="text" placeholder="Collez votre token ici" value="04E59FF09289F07CBBCF9815408DF7E6">
  </div>
  <div class="row">
    <button id="loadBtn" style="width:100%;">Charger le stock</button>
  </div>
  <div id="status"></div>
  <div id="results"></div>
  <p class="savebar">Le token est mémorisé sur cet appareil pour la prochaine fois.</p>

<script>
  const tokenInput = document.getElementById('token');
  const saved = localStorage.getItem('xy_token');
  if (saved) tokenInput.value = saved;

  document.getElementById('loadBtn').addEventListener('click', async function() {
    const token = tokenInput.value.trim();
    localStorage.setItem('xy_token', token);
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');
    resultsEl.innerHTML = '';
    statusEl.textContent = 'Connexion en cours...';
    try {
      const resp = await fetch('https://stockdistrib.victor-heinen.workers.dev/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'authorization': token },
        body: JSON.stringify({
          orderBy: 'jqbh asc', pageNum: 1, pageSize: 20,
          bhmc: '', xldw: '', spmc: '', shbh: '', language: 'fr', channel: '1'
        })
      });
      const data = await resp.json();
      if (data.code !== 'H0000') {
        statusEl.textContent = 'Erreur du serveur (code ' + data.code + '). Le token a peut-être expiré, récupérez-en un nouveau depuis le site.';
        return;
      }
      const items = data.data.list;
      statusEl.textContent = items.length + ' produits — mis à jour à ' + new Date().toLocaleTimeString('fr-FR');
      let html = '<table>';
      items.forEach(function(it) {
        const cls = it.kcsl === 0 ? 'empty' : (it.kcsl === it.kcrl ? 'full' : '');
        html += '<tr><td>' + it.spmc + '</td><td class="qty ' + cls + '">' + it.kcsl + ' / ' + it.kcrl + '</td></tr>';
      });
      html += '</table>';
      resultsEl.innerHTML = html;
    } catch (err) {
      statusEl.textContent = 'Échec de connexion : ' + err.message;
    }
  });
</script>
</body>
</html>
